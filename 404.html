<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Smartcom Limited</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="svg" href="assets/smartcom icon.svg" />

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <link rel="stylesheet" href="404.css" />
</head>
<body>

  <div class="flag-stripe" aria-hidden="true"><span></span><span></span><span></span></div>

  <main class="page">
    <!-- Blobs -->
    <div class="blob blob--green"></div>
    <div class="blob blob--red"></div>

    <div class="content">

      <!-- Brand -->
      <a href="index.html" class="brand" aria-label="Back to Smartcom homepage">
        <img src="assets/smartcom-logo.svg" alt="Smartcom" class="brand__logo-img" />
      </a>

      <!-- Error code -->
      <div class="err-code" aria-hidden="true">404</div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider__line divider__line--green"></div>
        <div class="divider__dot"></div>
        <div class="divider__line divider__line--red"></div>
      </div>

      <h1 class="err-title">Page Not Found</h1>

      <p class="err-desc">
        The page you're looking for doesn't exist or may have been moved.
        Let's get you back on track.
      </p>

      <!-- CTAs -->
      <div class="actions">
        <a href="index.html" class="btn btn--primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Back to Home
        </a>
        <a href="index.html#contact" class="btn btn--ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Contact Us
        </a>
      </div>

      <!-- Suggested pages -->
      <div class="suggestions">
        <p class="suggestions__label">Or visit one of these pages</p>
        <div class="suggestions__links">
          <a href="index.html#services"  class="sugg-link">Services</a>
          <a href="index.html#solutions" class="sugg-link">Solutions</a>
          <a href="index.html#about"     class="sugg-link">About</a>
          <a href="index.html#partners"  class="sugg-link">Partners</a>
          <a href="index.html#contact"   class="sugg-link">Contact</a>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    © <span id="yr"></span> Smartcom Limited. All rights reserved.
    <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
  </footer>

  <!--
    ══════════════════════════════════════════════════════════════
    HOW TO ACTIVATE THIS 404 PAGE
    ══════════════════════════════════════════════════════════════

    NETLIFY (recommended — automatic):
      Add a file called _redirects in your project root:
        /*  /404.html  404

    APACHE (.htaccess):
      ErrorDocument 404 /404.html

    NGINX (nginx.conf):
      error_page 404 /404.html;

    GITHUB PAGES:
      Rename this file to 404.html and put it in the repo root.
      GitHub Pages picks it up automatically.

    VERCEL (vercel.json):
      { "routes": [{ "src": "/(.*)", "dest": "/404.html", "status": 404 }] }
  -->

</body>
</html>
